<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <div heading-offset="0" class="active-1">
        <h1>Sign In</h1>
        <form action="#" method="post">
            <div>
                <label for="email-address"></label>
                <input type="email" id="email-address" placeholder="Email" required>
            </div>
            <div>
                <label for="password"></label>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <p>Forgot your password?</p>
            <button type="submit">Sign In</button>
        </form>
    </div>

    <div heading-offset="0" class="active-2">
        <h1>Hello, Friend!</h1>
        <p>Enter your personal details and start journey with us</p>
        <button class="change-1">Sign Up</button>
    </div>
    <div class="disable-down">
        <h1>Welcome Back!</h1>
        <p>To keep connected with us please login with your personal info</p>
        <button class="change-2">Sign In</button>
    </div>
    <div class="disable-down">
        <h1>Create Account</h1>
        <form action="#" method="post">
            <div>
                <label for="Name"></label>
                <input type="text" id="Name" placeholder="Name" required>
            </div>
            <div>
                <label for="email-address"></label>
                <input type="email" id="email-address" placeholder="Email" required>
            </div>
            <div>
                <label for="password"></label>
                <input type="password" id="password" placeholder="Password" required >
            </div>
            <button type="submit">Sign Up</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>

</html>
